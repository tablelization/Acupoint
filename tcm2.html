<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>針灸百科：初階/進階全體系</title>
    <style>
        :root {
            --primary: #2c3e50;
            --basic-color: #27ae60;
            --pro-color: #8e44ad;
            --accent: #e67e22;
            --bg: #f4f7f6;
        }

        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { text-align: center; padding: 20px; border-bottom: 3px solid var(--primary); margin-bottom: 20px; }
        header p { color: #666; font-size: 0.9em; }

        .controls { position: sticky; top: 0; background: var(--bg); padding: 15px 0; z-index: 100; border-bottom: 1px solid #ddd; }
        .search-bar { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ccc; border-radius: 8px; margin-bottom: 10px; }
        
        .filter-section { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .filter-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .filter-label { font-weight: bold; font-size: 14px; min-width: 70px; }
        
        .btn { padding: 5px 15px; border: 1px solid #ccc; border-radius: 15px; cursor: pointer; background: white; font-size: 13px; transition: 0.3s; }
        .btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-basic.active { background: var(--basic-color); border-color: var(--basic-color); }
        .btn-pro.active { background: var(--pro-color); border-color: var(--pro-color); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .card { background: white; border-radius: 12px; padding: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); border-top: 5px solid #ccc; }
        .card.basic { border-top-color: var(--basic-color); }
        .card.pro { border-top-color: var(--pro-color); }

        .card h2 { margin: 0 0 8px 0; font-size: 1.3em; display: flex; justify-content: space-between; }
        .badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; color: white; height: fit-content; }
        
        .info-row { margin-bottom: 8px; font-size: 14px; line-height: 1.4; }
        .label { font-weight: bold; color: #7f8c8d; margin-right: 5px; }
        
        .type-tag { display: inline-block; background: #eef2f3; border: 1px solid #dfe6e9; padding: 1px 8px; border-radius: 10px; font-size: 11px; margin-right: 4px; color: #2d3436; }
        .symptom-tag { display: inline-block; color: var(--accent); font-size: 12px; margin-right: 5px; font-weight: 500; }

        .warning { color: #d63031; font-weight: bold; font-size: 12px; margin-top: 8px; padding: 5px; background: #fff5f5; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>針灸百科檢索系統</h1>
        <p>整合「運動損傷初階 18 穴」與「進階特定穴/五輸穴/十五絡穴系統」</p>
    </header>

    <div class="controls">
        <input type="text" id="searchInput" class="search-bar" placeholder="搜尋名稱、經絡、症狀或特定穴類型 (如：原穴、井穴、腰痛)...">
        
        <div class="filter-section">
            <div class="filter-group">
                <span class="filter-label">課程級別：</span>
                <button class="btn active" data-filter="all">全部</button>
                <button class="btn btn-basic" data-filter="basic">初階 (18穴)</button>
                <button class="btn btn-pro" data-filter="pro">進階系統</button>
            </div>
            <div class="filter-group">
                <span class="filter-label">特定穴位：</span>
                <button class="btn" data-tag="五輸穴">五輸穴</button>
                <button class="btn" data-tag="原穴">原穴</button>
                <button class="btn" data-tag="絡穴">絡穴</button>
                <button class="btn" data-tag="八脈交會穴">八脈交會穴</button>
            </div>
        </div>
        <div id="stats" style="font-size: 12px; color: #888;">顯示計：0</div>
    </div>

    <div class="grid" id="pointGrid"></div>
</div>

<script>
    const acupunctureData = [
        // 初階 18 穴 (保留完整筆記描述)
        { name: "合谷", lv: "basic", m: "手陽明大腸經", pos: "手背第一、二掌骨間", sym: "頭面百病、牙痛、感冒", type: "原穴、四總穴", tags: ["頭面", "五輸穴"], note: "孕婦忌用" },
        { name: "曲池", lv: "basic", m: "手陽明大腸經", pos: "肘橫紋外側端", sym: "上肢痛、濕疹、高血壓", type: "合穴", tags: ["五輸穴", "清熱"], note: "" },
        { name: "手三里", lv: "basic", m: "手陽明大腸經", pos: "肘橫紋下二寸", sym: "滑鼠手、前臂肌肉過勞", type: "經穴屬性", tags: ["上肢"], note: "" },
        { name: "列缺", lv: "basic", m: "手太陰肺經", pos: "橈骨莖突上方1.5寸", sym: "頭項強痛、頸椎僵硬、感冒", type: "絡穴、四總穴、八脈交會穴", tags: ["頸椎"], note: "通於任脈" },
        { name: "尺澤", lv: "basic", m: "手太陰肺經", pos: "肘窩肱二頭肌腱外側", sym: "咳嗽、網球肘內側、筋膜潤化", type: "合穴", tags: ["五輸穴", "上肢"], note: "" },
        { name: "內關", lv: "basic", m: "手厥陰心包經", pos: "腕橫紋上二寸兩筋間", sym: "心悸、焦慮失眠、胃痛", type: "絡穴、八脈交會穴", tags: ["安神", "心血管"], note: "通於陰維脈" },
        { name: "後溪", lv: "basic", m: "手太陽小腸經", pos: "第五掌指關節後凹陷", sym: "落枕、肩背痛、脊柱代償", type: "輸穴、八脈交會穴", tags: ["五輸穴", "頸椎"], note: "通於督脈" },
        { name: "太沖", lv: "basic", m: "足厥陰肝經", pos: "足背第一二蹠骨間凹陷", sym: "情緒壓抑、肌肉抽筋、失眠", type: "輸穴、原穴", tags: ["五輸穴", "情緒"], note: "四關穴之一" },
        { name: "足三里", lv: "basic", m: "足陽明胃經", pos: "膝下三寸脛骨外側", sym: "胃痛腹脹、補氣、免疫力", type: "合穴、四總穴", tags: ["五輸穴", "補氣"], note: "補法要穴" },
        { name: "陽陵泉", lv: "basic", m: "足少陽膽經", pos: "腓骨小頭前下方凹陷", sym: "全身筋傷、ITB緊張、膝痛", type: "合穴、八會穴(筋會)", tags: ["五輸穴", "筋傷"], note: "" },
        { name: "委中", lv: "basic", m: "足太陽膀胱經", pos: "膝窩橫紋正中", sym: "腰背痠痛、坐骨神經痛", type: "合穴、四總穴", tags: ["五輸穴", "腰背"], note: "腰背委中求" },
        { name: "太溪", lv: "basic", m: "足少陰腎經", pos: "內踝與跟腱間凹陷", sym: "補腎、耳鳴、足跟痛", type: "輸穴、原穴", tags: ["五輸穴", "補腎"], note: "" },
        { name: "崑崙", lv: "basic", m: "足太陽膀胱經", pos: "外踝與跟腱間凹陷", sym: "踝扭傷、足底筋膜炎", type: "經穴", tags: ["五輸穴", "下肢"], note: "" },
        { name: "三陰交", lv: "basic", m: "足太陰脾經", pos: "內踝尖上三寸", sym: "婦科、失眠、下肢水腫", type: "三經交會穴", tags: ["婦科"], note: "肝脾腎三經交會" },
        { name: "犢鼻", lv: "basic", m: "足陽明胃經", pos: "髕骨下緣外側凹陷", sym: "膝關節腫痛、退化", type: "局部取穴", tags: ["膝蓋"], note: "" },
        { name: "承山", lv: "basic", m: "足太陽膀胱經", pos: "腓腸肌腹下分叉處", sym: "小腿抽筋、跟腱炎、靜脈曲張", type: "局部取穴", tags: ["下肢"], note: "" },
        { name: "公孫", lv: "basic", m: "足太陰脾經", pos: "第一蹠骨基底前下方", sym: "胃心胸痛、核心失衡", type: "絡穴、八脈交會穴", tags: ["腸胃"], note: "通於衝脈" },
        { name: "照海", lv: "basic", m: "足少陰腎經", pos: "內踝尖下方凹陷處", sym: "足底痛、咽喉乾、步態調校", type: "八脈交會穴", tags: ["補腎"], note: "通於陰蹻脈" },

        // 進階特定穴 (補充五輸系統與十五絡)
        { name: "少商", lv: "pro", m: "手太陰肺經", pos: "大指末節橈側指甲旁", sym: "喉嚨痛、發燒、中暑昏迷", type: "井穴", tags: ["五輸穴", "急救"], note: "" },
        { name: "魚際", lv: "pro", m: "手太陰肺經", pos: "第一掌骨中點橈側", sym: "身熱、咳嗽、失音", type: "滎穴", tags: ["五輸穴", "呼吸道"], note: "" },
        { name: "太淵", lv: "pro", m: "手太陰肺經", pos: "腕橫紋橈側", sym: "無脈症、久咳、氣虛", type: "輸穴、原穴、八會穴(脈會)", tags: ["五輸穴", "補氣"], note: "" },
        { name: "豐隆", lv: "pro", m: "足陽明胃經", pos: "外踝尖上 8 寸", sym: "多痰、哮喘、頭痛眩暈", type: "絡穴", tags: ["化痰"], note: "中醫化痰第一穴" },
        { name: "通里", lv: "pro", m: "手少陰心經", pos: "腕橫紋上 1 寸", sym: "心悸、舌強不語、悲恐", type: "絡穴", tags: ["安神"], note: "" },
        { name: "支正", lv: "pro", m: "手太陽小腸經", pos: "腕橫紋上 5 寸", sym: "贅疣(扁平疣)、肘臂痠痛", type: "絡穴", tags: ["皮膚"], note: "解表熱與皮膚贅物" },
        { name: "飛揚", lv: "pro", m: "足太陽膀胱經", pos: "外踝尖上 7 寸", sym: "慢性腰痛、鼻塞、下肢沉重", type: "絡穴", tags: ["腰背"], note: "" },
        { name: "光明", lv: "pro", m: "足少陽膽經", pos: "外踝尖上 5 寸", sym: "夜盲、視物不清、乳房脹痛", type: "絡穴", tags: ["眼科"], note: "" },
        { name: "蠡溝", lv: "pro", m: "足厥陰肝經", pos: "內踝尖上 5 寸", sym: "陰部癢痛、睪丸腫痛", type: "絡穴", tags: ["泌尿"], note: "" },
        { name: "外關", lv: "pro", m: "手少陽三焦經", pos: "腕背橫紋上 2 寸", sym: "偏頭痛、發燒、耳鳴", type: "絡穴、八脈交會穴", tags: ["感冒"], note: "通於陽維脈" }
    ];

    const grid = document.getElementById('pointGrid');
    const searchInput = document.getElementById('searchInput');
    const stats = document.getElementById('stats');
    let levelFilter = 'all';
    let tagFilter = '';

    function render() {
        const term = searchInput.value.toLowerCase();
        const filtered = acupunctureData.filter(p => {
            const matchSearch = p.name.includes(term) || p.m.includes(term) || p.sym.includes(term) || p.type.includes(term);
            const matchLevel = levelFilter === 'all' || p.lv === levelFilter;
            const matchTag = tagFilter === '' || p.type.includes(tagFilter) || p.tags.includes(tagFilter);
            return matchSearch && matchLevel && matchTag;
        });

        grid.innerHTML = filtered.map(p => `
            <div class="card ${p.lv}">
                <h2>${p.name} <span class="badge" style="background:${p.lv==='basic'?'#27ae60':'#8e44ad'}">${p.lv==='basic'?'初階':'進階'}</span></h2>
                <div class="info-row" style="color:#2980b9; font-weight:bold;">${p.m}</div>
                <div class="info-row"><span class="label">定位：</span>${p.pos}</div>
                <div class="info-row"><span class="label">症狀：</span>${p.sym.split('、').map(s=>`<span class="symptom-tag">${s}</span>`).join('')}</div>
                <div class="info-row"><span class="label">屬性：</span>${p.type.split('、').map(t=>`<span class="type-tag">${t}</span>`).join('')}</div>
                ${p.note ? `<div class="info-row"><span class="label">備註：</span>${p.note}</div>` : ''}
                ${p.name === '合谷' ? '<div class="warning">⚠ 孕婦忌用，小心促宮縮</div>' : ''}
            </div>
        `).join('');
        stats.innerText = `顯示計：${filtered.length} 個穴位`;
    }

    // 篩選邏輯
    document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('click', function() {
            if (this.dataset.filter) {
                document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
                levelFilter = this.dataset.filter;
            } else if (this.dataset.tag) {
                const isAlreadyActive = this.classList.contains('active');
                document.querySelectorAll('[data-tag]').forEach(b => b.classList.remove('active'));
                tagFilter = isAlreadyActive ? '' : this.dataset.tag;
                if (!isAlreadyActive) this.classList.add('active');
                render();
                return;
            }
            this.classList.add('active');
            render();
        });
    });

    searchInput.addEventListener('input', render);
    render();
</script>

</body>
</html>
